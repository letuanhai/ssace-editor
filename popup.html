<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>SS Ext</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        width: 300px;
        font-family: system-ui, sans-serif;
        font-size: 13px;
        background: #1e1e1e;
        color: #ddd;
      }
      header {
        padding: 10px 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid #3a3a3a;
      }
      header h1 {
        font-size: 13px;
        margin: 0;
        font-weight: 600;
      }
      #toggle-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        border-bottom: 1px solid #3a3a3a;
      }
      #toggle-btn {
        flex: 1;
        padding: 8px;
        border: 1px solid #555;
        border-radius: 4px;
        background: #2d2d2d;
        color: #ddd;
        cursor: pointer;
        font-size: 13px;
      }
      #toggle-btn:hover {
        background: #3a3a3a;
      }
      #toggle-state {
        font-weight: 600;
        min-width: 28px;
        text-align: center;
      }
      #toggle-state.on {
        color: #6bcf6b;
      }
      #actions {
        max-height: 320px;
        overflow-y: auto;
        padding: 4px 0;
      }
      .action-btn {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        box-sizing: border-box;
        padding: 6px 12px;
        border: none;
        background: transparent;
        color: #ddd;
        text-align: left;
        cursor: pointer;
        font-size: 13px;
      }
      .action-btn:hover {
        background: #2d2d2d;
      }
      .hotkey-hint {
        color: #888;
        font-size: 11px;
        margin-left: 8px;
        white-space: nowrap;
      }
      footer {
        padding: 8px 12px;
        border-top: 1px solid #3a3a3a;
      }
      #options-link {
        background: none;
        border: none;
        color: #6bb6ff;
        cursor: pointer;
        font-size: 13px;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>SS Ext</h1>
    </header>
    <div id="toggle-row">
      <button id="toggle-btn">Toggle Ace editor</button>
      <span id="toggle-state">...</span>
    </div>
    <div id="actions"></div>
    <footer>
      <button id="options-link">Options&hellip;</button>
    </footer>
    <script src="tools-meta.js"></script>
    <script src="defaults.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
