<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>SS Ext</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #1e1e1e;
        --fg: #ddd;
        --border: #3a3a3a;
        --btn-bg: #2d2d2d;
        --btn-border: #555;
        --hover: #3a3a3a;
        --row-hover: #2d2d2d;
        --hint: #888;
        --on: #6bcf6b;
        --link: #6bb6ff;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #fff;
          --fg: #222;
          --border: #ccc;
          --btn-bg: #f5f5f5;
          --btn-border: #bbb;
          --hover: #e8e8e8;
          --row-hover: #f0f0f0;
          --hint: #777;
          --on: #2a7f2a;
          --link: #0b62c4;
        }
      }
      body {
        margin: 0;
        width: 300px;
        font-family: system-ui, sans-serif;
        font-size: 13px;
        background: var(--bg);
        color: var(--fg);
      }
      header {
        padding: 10px 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--border);
      }
      header h1 {
        font-size: 13px;
        margin: 0;
        font-weight: 600;
      }
      .toggle-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
      }
      .toggle-btn {
        flex: 1;
        padding: 8px;
        border: 1px solid var(--btn-border);
        border-radius: 4px;
        background: var(--btn-bg);
        color: var(--fg);
        cursor: pointer;
        font-size: 13px;
      }
      .toggle-btn:hover {
        background: var(--hover);
      }
      .toggle-state {
        font-weight: 600;
        min-width: 28px;
        text-align: center;
      }
      .toggle-state.on {
        color: var(--on);
      }
      #actions {
        max-height: 320px;
        overflow-y: auto;
        padding: 4px 0;
      }
      .action-btn {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        box-sizing: border-box;
        padding: 6px 12px;
        border: none;
        background: transparent;
        color: var(--fg);
        text-align: left;
        cursor: pointer;
        font-size: 13px;
      }
      .action-btn:hover {
        background: var(--row-hover);
      }
      .hotkey-hint {
        color: var(--hint);
        font-size: 11px;
        margin-left: 8px;
        white-space: nowrap;
      }
      footer {
        padding: 8px 12px;
        border-top: 1px solid var(--border);
      }
      #options-link {
        background: none;
        border: none;
        color: var(--link);
        cursor: pointer;
        font-size: 13px;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>SS Ext</h1>
    </header>
    <div class="toggle-row">
      <button id="toggle-btn" class="toggle-btn">Toggle Ace editor</button>
      <span id="toggle-state" class="toggle-state">...</span>
    </div>
    <div class="toggle-row">
      <button id="ctxmenu-btn" class="toggle-btn" title="ON: browser-native mouse handling everywhere - native right-click menu, text selection/copy in trees and panels; all SAS Studio drag (trees, tabs, dialogs) and editor mouse handling disabled until OFF. Applies immediately.">
        Toggle native mouse handling
      </button>
      <span id="ctxmenu-state" class="toggle-state">...</span>
    </div>
    <div id="actions"></div>
    <footer>
      <button id="options-link">Options&hellip;</button>
    </footer>
    <script src="tools-meta.js"></script>
    <script src="defaults.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
